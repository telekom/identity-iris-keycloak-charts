apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}
  labels: {{ include "keycloak.labels" $ | nindent 4 }}
type: Opaque
data:
  {{- $oldOrNewPassword := .Values.adminPassword | default .Values.admin_password }}
  {{- $keycloakPassword := dict "password" $oldOrNewPassword "rules" .Values.global.passwordRules }}
  keycloakPassword: {{ $keycloakPassword | include "passutil.validated" | b64enc | quote }}
  {{- $dbPassword := dict "password" .Values.global.db.password "rules" .Values.global.passwordRules }}
  dbPassword: {{ $dbPassword | include "passutil.validated" | b64enc | quote }}
  {{- if .Values.truststore }}
  truststore.jks: {{ .Values.truststore | quote }}
  {{- end }}

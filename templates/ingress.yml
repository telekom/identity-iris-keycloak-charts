{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  {{- include "keycloak.ingress.annotations" $ | nindent 2 }}
  name: {{ .Release.Name }}
  labels: {{ include "keycloak.labels" $ | nindent 4 }}
spec:
  rules:
  {{- range (include "keycloak.hosts" . | fromYamlArray) }}
  - host: {{ . }}
    http:
      paths:
        - backend:
            service:
              name: {{ $.Release.Name }}
              port:
                number: 80
          path: /realms/
          pathType: Prefix
        - backend:
            service:
              name: {{ $.Release.Name }}
              port:
                number: 80
          path: /auth
          pathType: Prefix
        - backend:
            service:
              name: {{ $.Release.Name }}
              port:
                number: 80
          path: /admin/
          pathType: Prefix
        - backend:
            service:
              name: {{ $.Release.Name }}
              port:
                number: 80
          path: /resources/
          pathType: Prefix
        - backend:
            service:
              name: {{ $.Release.Name }}
              port:
                number: 80
          path: /.well-known/
          # some ingress doesn't support Prefix pathType, so we use ImplementationSpecific to support them
          pathType: ImplementationSpecific
  {{- end }}
{{- if .Values.ingress.ingressClassName }}
  ingressClassName: {{ .Values.ingress.ingressClassName }}
{{- end }}
{{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
{{- include "keycloak.tls.hosts" . | nindent 4 -}}
{{- include "keycloak.tls.secret" . | nindent 4 -}}
{{- end }}
{{- end }}

apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels: {{ include "keycloak.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{ include "keycloak.selector" $ | nindent 4 }}
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8080
  - name: https
    port: 443
    protocol: TCP
    targetPort: 8443
{{- if eq .Values.prometheus.serviceMonitor.enabled true }}
  - name: metrics-http
    port: 9542
    protocol: TCP
    targetPort: {{ .Values.prometheus.port | default 9542 }}
{{- end -}}
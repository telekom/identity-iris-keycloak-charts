{{- if and (.Values.prometheus.enabled) (.Values.prometheus.podMonitor.enabled) -}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" $ | nindent 4 }}
    {{- if .Values.prometheus.podMonitor.selector }}
    release: {{ .Values.prometheus.podMonitor.selector }}
    {{- end }}
spec:
  podMetricsEndpoints:
    - port: mgmt
      path: "/auth/metrics"
      {{- with .Values.prometheus.podMonitor.metricRelabelings }}
      metricRelabelings:
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- if .Values.prometheus.podMonitor.scheme }}
      scheme: {{ .Values.prometheus.podMonitor.scheme }}
      {{- end }}
      {{- if .Values.prometheus.podMonitor.interval }}
      interval: {{ .Values.prometheus.podMonitor.interval | quote}}
      {{- end }}
      {{- if .Values.prometheus.podMonitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.prometheus.podMonitor.scrapeTimeout | quote }}
      {{- end }}
      {{- if .Values.prometheus.podMonitor.honorLabels }}
      honorLabels: {{ .Values.prometheus.podMonitor.honorLabels }}
      {{- end }}
    {{- if .Values.prometheus.httpMetricsEnabled }}
    - port: http
      path: "/auth/realms/master/metrics"
      {{- with .Values.prometheus.podMonitor.metricRelabelings }}
      metricRelabelings:
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- if .Values.prometheus.podMonitor.scheme }}
      scheme: {{ .Values.prometheus.podMonitor.scheme }}
      {{- end }}
      {{- if .Values.prometheus.podMonitor.interval }}
      interval: {{ .Values.prometheus.podMonitor.interval | quote}}
      {{- end }}
      {{- if .Values.prometheus.podMonitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.prometheus.podMonitor.scrapeTimeout | quote }}
      {{- end }}
      {{- if .Values.prometheus.podMonitor.honorLabels }}
      honorLabels: {{ .Values.prometheus.podMonitor.honorLabels }}
      {{- end }}
    {{- end }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "keycloak.selector" $ | nindent 6 }}
      {{- include "keycloak.nameLabel" $ | nindent 6 }}
{{- end -}}

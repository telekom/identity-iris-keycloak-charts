{{- if and (.Values.prometheus.enabled) (.Values.prometheus.serviceMonitor.enabled) -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" $ | nindent 4 }}
    {{- if .Values.prometheus.serviceMonitor.selector }}
    release: {{ .Values.prometheus.serviceMonitor.selector }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "keycloak.selector" $ | nindent 6 }}
      {{- include "keycloak.nameLabel" $ | nindent 6 }}
      interface: metrics
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics-mgmt
      path: "/auth/metrics"
      {{- with .Values.prometheus.serviceMonitor.metricRelabelings }}
      metricRelabelings:
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- if .Values.prometheus.serviceMonitor.scheme }}
      scheme: {{ .Values.prometheus.serviceMonitor.scheme }}
      {{- end }}
      {{- if .Values.prometheus.serviceMonitor.interval }}
      interval: {{ .Values.prometheus.serviceMonitor.interval | quote}}
      {{- end }}
      {{- if .Values.prometheus.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.prometheus.serviceMonitor.scrapeTimeout | quote }}
      {{- end }}
      {{- if .Values.prometheus.serviceMonitor.honorLabels }}
      honorLabels: {{ .Values.prometheus.serviceMonitor.honorLabels }}
      {{- end }}
    - port: metrics-http
      path: "/auth/realms/master/metrics"
      {{- with .Values.prometheus.serviceMonitor.metricRelabelings }}
      metricRelabelings:
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- if .Values.prometheus.serviceMonitor.scheme }}
      scheme: {{ .Values.prometheus.serviceMonitor.scheme }}
      {{- end }}
      {{- if .Values.prometheus.serviceMonitor.interval }}
      interval: {{ .Values.prometheus.serviceMonitor.interval | quote}}
      {{- end }}
      {{- if .Values.prometheus.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.prometheus.serviceMonitor.scrapeTimeout | quote }}
      {{- end }}
      {{- if .Values.prometheus.serviceMonitor.honorLabels }}
      honorLabels: {{ .Values.prometheus.serviceMonitor.honorLabels }}
      {{- end }}
  {{- if .Values.prometheus.serviceMonitor.targetLabels }}
  targetLabels: {{ include "service-monitor.targetLabels" $ | nindent 2 }}
  {{- end }}
{{- end -}}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  annotations:
  {{- include "keycloak.annotations" $ | nindent 4 }}
  {{- include "keycloak.checksums" $ | nindent 4 }}   
  labels: {{ include "keycloak.labels" $ | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicas }}
  {{- end }}
  selector:
    matchLabels: {{ include "keycloak.selector" $ | nindent 6 }}
  template:
    metadata:
      annotations:
      {{- include "keycloak.annotations" $ | nindent 8 }}
      {{- include "keycloak.checksums" $ | nindent 8 }}  
{{- if eq .Values.prometheus.enabled true }}
        prometheus.io/path: '{{ .Values.prometheus.path | default "/metrics" }}'
        prometheus.io/scrape: 'true'
        prometheus.io/port: '{{ .Values.prometheus.port | default 9542 }}'
{{- end }}
      labels: 
      {{- include "keycloak.labels" $ | nindent 8 }}
      {{- include "common.status-monitor.labels" $ | nindent 8 }}
      {{- include "status-monitor.labels" $ | nindent 8 }}
    spec:
      {{- include "image_pull_secrets" $ | indent 6 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/instance
                  operator: In
                  values:
                  - {{ .Release.Name }}-keycloak
              topologyKey: "kubernetes.io/hostname"
      serviceAccountName: {{ .Release.Name }}
      containers:
      - name: haproxy
        image: '{{ include "haproxy.image" $ }}'
        ports:
        - { containerPort: 9090, protocol: TCP, name: http }
        resources:
          limits:
            memory: 1Gi
            cpu: 1
          requests:
            memory: 250Mi
            cpu: 250m
        volumeMounts:
        - name: ha-proxy-config
          mountPath: /usr/local/etc/haproxy
      - name: keycloak
        image: '{{ include "keycloak.image" $ }}'
        imagePullPolicy: {{ .Values.imagePullPolicy | default .Values.global.imagePullPolicy }}
        securityContext: {{ .Values.securityContext | toYaml | nindent 10 }}
        command: ['/bin/bash']
        args: ['-c', 'rm -f /opt/jboss/keycloak/standalone/configuration/keycloak-add-user.json || true; /opt/jboss/tools/docker-entrypoint.sh -b 0.0.0.0 -c customer-standalone-ha.xml']
        env:
        {{- include "keycloak.env" $ | indent 8 }}
        ports:
{{- if eq .Values.prometheus.enabled true }}
        - { containerPort: {{ .Values.prometheus.port | default 9542 }}, protocol: TCP, name: metrics-http }
{{- end }}
        livenessProbe:
          initialDelaySeconds: {{ .Values.initialDelaySeconds | default 60 }}
          periodSeconds: {{ .Values.periodSeconds | default 10 }}
          failureThreshold: {{ .Values.failureThreshold | default 30 }}
          httpGet:
            path: '/auth/realms/master'
            port: 8080
            scheme: 'HTTP'
        readinessProbe:
          httpGet:
            path: '/auth/realms/master'
            port: 8080
            scheme: 'HTTP'
        resources: {{ .Values.resources | toYaml | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: standalone
          mountPath: /opt/jboss/keycloak/standalone
        {{- include "keycloak.db.certificates.volumeMount" $ | indent 8 }}
      initContainers:
      - name: "init-standalone"
        image: '{{ include "keycloak.image" $ }}'
        imagePullPolicy: {{ .Values.imagePullPolicy | default .Values.global.imagePullPolicy }}
        securityContext: {{ .Values.securityContext | toYaml | nindent 10 }}
        resources: {{ .Values.resources | toYaml | nindent 10 }}
        volumeMounts:
        - name: standalone
          mountPath: /standalone
        - name: config
          mountPath: /tmp/config
        - name: realms
          mountPath: /tmp/realms
        command: ['/bin/bash']
        args: ['-c', 'cp -av /opt/jboss/keycloak/standalone/. /standalone/ || true; cp -av /tmp/config/. /standalone/configuration/ || true; cp -av /tmp/realms/ /standalone/configuration/ || true']
      - name: "check-database"
        image: '{{ include "keycloak.init.image" $ }}'
        imagePullPolicy: {{ .Values.postgresql.imagePullPolicy | default .Values.global.imagePullPolicy }}
        securityContext: {{ .Values.postgresql.securityContext | toYaml | nindent 10 }}
        command: ['/bin/bash']
        args: ['-c', 'until pg_isready -U {{ .Values.global.db.username }}; do echo waiting for database; sleep 2; done;']
        env:
        {{- include "keycloak.checkdatabase.env" $ | indent 8 }}
        resources: {{ .Values.postgresql.resources | toYaml | nindent 10 }}
      volumes:
      - name: tmp
        emptyDir: {}
      - name: standalone
        emptyDir: {}
      - name: config
        configMap:
          name: {{ .Release.Name }}-config
      - name: ha-proxy-config
        configMap:
          name: {{ .Release.Name }}-ha-proxy-config
      - name: realms
        configMap:
          name: {{ .Release.Name }}-realm
      {{- include "keycloak.db.certificates.volume" $ | indent 6 }}

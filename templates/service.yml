apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "keycloak.labels" $ | nindent 4 }}
    {{- include "common.status-monitor.labels" $ | nindent 4 }}
    {{- include "keycloak.status-monitor.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{ include "keycloak.selector" $ | nindent 4 }}
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: http

apiVersion: v1
kind: Service
metadata:
  name: {{ include "keycloak.fullname" . }}
  labels: {{ include "keycloak.labels" $ | nindent 4 }}
          {{- include "common.status-monitor.labels" $ | nindent 4 }}
          {{- include "status-monitor.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{ include "keycloak.selector" $ | nindent 4 }}
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 9090
    

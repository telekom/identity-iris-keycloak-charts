apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris
  annotations:
    ops.eni.telekom.de/pipeline-meta-ref: iris-pipeline-metadata
    checksum/config: 4f8e079a9aa69148658e4e2d6bd8c828353f38428e79a4339ec55327ecf619e1
    checksum/realm: bbcc4c49db264266ffd85e0781dccdd85d2473864baccace107d4fac42af8cf1   
  labels: 
    app: iris
    helm.sh/chart: iris-0.0.0
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: iris-keycloak
    app.kubernetes.io/component: idp
    app.kubernetes.io/part-of: tif-runtime
    tif.telekom.de/group: tif
spec:
  replicas: 1
  selector:
    matchLabels: 
      app.kubernetes.io/instance: iris-keycloak
  template:
    metadata:
      annotations:
        ops.eni.telekom.de/pipeline-meta-ref: iris-pipeline-metadata
        checksum/config: 4f8e079a9aa69148658e4e2d6bd8c828353f38428e79a4339ec55327ecf619e1
        checksum/realm: bbcc4c49db264266ffd85e0781dccdd85d2473864baccace107d4fac42af8cf1
        prometheus.io/path: '/metrics'
        prometheus.io/scrape: 'true'
        prometheus.io/port: '9542'
      labels:
        app: iris
        helm.sh/chart: iris-0.0.0
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/instance: iris-keycloak
        app.kubernetes.io/component: idp
        app.kubernetes.io/part-of: tif-runtime
        tif.telekom.de/group: tif
        tardis.telekom.de/cluster: "Default"
        tardis.telekom.de/namespace: "default"
        tardis.telekom.de/product: "iris"
        tardis.telekom.de/team: "io"
        tardis.telekom.de/product: "iris"
        tardis.telekom.de/subproduct: "iris"
    spec:      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/instance
                  operator: In
                  values:
                  - iris-keycloak
              topologyKey: kubernetes.io/hostname
      securityContext: 
        {}
      containers:
      - name: haproxy
        image: 'mtr.devops.telekom.de/tardis-common/haproxy:2.4.0-alpine'
        imagePullPolicy: IfNotPresent
        ports:
        - { containerPort: 9090, protocol: TCP, name: http }
        - { containerPort: 9542, protocol: TCP, name: metrics-http }
        securityContext: 
          {}
        resources: 
          limits:
            cpu: 1
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 250Mi
        volumeMounts:
        - name: ha-proxy-config
          mountPath: /usr/local/etc/haproxy
      - name: keycloak
        image: 'mtr.devops.telekom.de/tardis-internal/io/iris:3.2.0'
        imagePullPolicy: IfNotPresent
        securityContext: 
          {}
        args: ['start --optimized --import-realm']
        env:        
        - name: KC_HOSTNAME
          value: iris-default.lab.tardis.telekom.de
        - name: KC_PROXY
          value: edge
        - name: KC_HTTP_ENABLED
          value: "true"
        - name: KC_CACHE_CONFIG_FILE  
          value: eni-infinispan.xml
        - name: jgroups.dns.query
          value: iris-jgroups.default
        - name: KEYCLOAK_ADMIN
          value: admin
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: iris
              key: adminPassword
        - name: KEYCLOAK_LOGLEVEL
          value: INFO
        - name: PROXY_ADDRESS_FORWARDING
          value: "true"
        - name: KC_DB_URL_PORT
          value: "5432"
        - name: KC_DB_URL_HOST
          value: database.domain.telekom.de
        - name: KC_DB_URL_DATABASE
          value: the-database
        - name: KC_DB_USERNAME
          value: iris
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: iris
              key: databasePassword
        livenessProbe:
          httpGet:
            path: '/auth/'
            port: 8080
          initialDelaySeconds: 300
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: '/auth/realms/master'
            port: 8080
          initialDelaySeconds: 30
          timeoutSeconds: 1
        startupProbe:
          httpGet:
            path: '/auth/'
            port: 8080
          initialDelaySeconds: 30
          timeoutSeconds: 1
          failureThreshold: 60
          periodSeconds: 5
        resources: 
          limits:
            cpu: 1
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 600Mi
        volumeMounts:
        - name: config
          mountPath: /opt/keycloak/conf/
        - name: realms
          mountPath: /opt/keycloak/data/import/ 
        - name: tmp
          mountPath: /tmp
        - name: tmp
          mountPath: /opt/keycloak/data/tmp        
      initContainers:
      - name: "check-database"
        image: 'mtr.devops.telekom.de/tardis-common/postgres:12.3-debian'
        imagePullPolicy: IfNotPresent
        securityContext: 
          {}
        command: ['/bin/bash']
        args: ['-c', 'until pg_isready -U iris; do echo waiting for database; sleep 2; done;']
        env:        
        - name: PGHOST
          value: database.domain.telekom.de
        - name: PGDATABASE
          value: the-database
        - name: PGUSER
          value: iris
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: iris
              key: databasePassword
        resources: 
          limits:
            cpu: 100m
            memory: 500Mi
          requests:
            cpu: 20m
            memory: 200Mi
      terminationGracePeriodSeconds: 60
      volumes:
      - name: tmp
        emptyDir: {}
      - name: jboss
        emptyDir: {}
      - name: config
        configMap:
          name: iris-config
      - name: ha-proxy-config
        configMap:
          name: iris-ha-proxy-config
      - name: realms
        configMap:
          name: iris-realm

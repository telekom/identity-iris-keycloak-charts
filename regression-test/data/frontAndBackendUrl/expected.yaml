        args: ['-c', 'cp -av /opt/jboss/. /jboss/ || true; cp -av /tmp/config/. /jboss/keycloak/standalone/configuration/ || true; cp -av /tmp/realms/ /jboss/keycloak/standalone/configuration/ || true']
      - name: "check-database"
        image: 'mtr.devops.telekom.de/repository/tardis-common/postgres:12.3-debian'
        imagePullPolicy: IfNotPresent
        securityContext: 
          {}
        command: ['/bin/bash']
        args: ['-c', 'until pg_isready -U sso; do echo waiting for database; sleep 2; done;']
        env:        
        - name: PGHOST
          value: keycloak-postgresql
        - name: PGDATABASE
          value: sso
        - name: PGUSER
          value: sso
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak
              key: dbPassword
        resources: 
          limits:
            cpu: 100m
            memory: 500Mi
          requests:
            cpu: 20m
            memory: 200Mi
      terminationGracePeriodSeconds: 60
      volumes:
      - name: tmp
        emptyDir: {}
      - name: jboss
        emptyDir: {}
      - name: config
        configMap:
          name: keycloak-config
      - name: ha-proxy-config
        configMap:
          name: keycloak-ha-proxy-config
      - name: realms
        configMap:
          name: keycloak-realm

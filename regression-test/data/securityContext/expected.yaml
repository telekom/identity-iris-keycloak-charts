apiVersion : v1
kind: ConfigMap
metadata:
  name: keycloak-ha-proxy-config
  labels: 
    app: keycloak
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: keycloak-keycloak
    app.kubernetes.io/component: idp

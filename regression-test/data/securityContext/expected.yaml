# Source: iris/charts/postgresql/templates/deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-postgresql
  labels: 
    app: keycloak
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: keycloak-postgresql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: tif-runtime
    app.kubernetes.io/managed-by: tif
    helm.sh/chart: postgresql-1.0.0
    tif.telekom.de/group: tif
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: 
      app.kubernetes.io/instance: keycloak-postgresql
  template:
    metadata:
      labels:
        app: keycloak
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/instance: keycloak-postgresql
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: tif-runtime
        app.kubernetes.io/managed-by: tif
        helm.sh/chart: postgresql-1.0.0
        tif.telekom.de/group: tif
        tardis.telekom.de/cluster: "Default"
        tardis.telekom.de/namespace: "default"
        tardis.telekom.de/team: "io"
        tardis.telekom.de/product: "postgresql"
        tardis.telekom.de/product: "iris"
        tardis.telekom.de/subproduct: "keycloak-database"
    spec:      
      securityContext: 
        fsGroup: 999
        supplementalGroups:
        - 999
      containers:
      - name: keycloak-postgresql
        resources: 
          limits:
            cpu: 100m
            memory: 500Mi
          requests:
            cpu: 20m
            memory: 200Mi
        env:        
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_USER
          value: sso
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-postgresql
              key: password
        - name: POSTGRES_DATABASE
          value: sso
        - name: POSTGRES_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-postgresql
              key: adminPassword
        - name: POSTGRES_MAX_CONNECTIONS
          value: "100"
        - name: POSTGRES_SHARED_BUFFERS
          value: 32MB
        - name: POSTGRES_MAX_PREPARED_TRANSACTIONS
          value: "100"
        image: 'mtr.devops.telekom.de/tardis-common/postgres:12.3-debian'
        imagePullPolicy: IfNotPresent
        securityContext: 
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 999
          runAsNonRoot: true
          runAsUser: 999
        ports:
        - containerPort: 5432
          protocol: TCP
        volumeMounts:
        - mountPath: /tmp
          name: keycloak-postgresql-tmp
        - mountPath: /var/run/postgresql
          name: keycloak-postgresql-run
        - mountPath: /var/lib/postgresql/data
          name: keycloak-postgresql-data
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 1
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - pg_isready -U sso
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
      volumes:
      - name: keycloak-postgresql-run
        emptyDir: {}
      - name: keycloak-postgresql-tmp
        emptyDir: {}
      - name: keycloak-postgresql-data
        persistentVolumeClaim:
          claimName: keycloak-postgresql-data
      restartPolicy: Always

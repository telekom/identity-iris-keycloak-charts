{{- if eq .Values.global.database.location "local" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  labels: {{ include "postgresql.labels" $ | nindent 4 }}
type: Opaque
data:
{{- if .Values.adminPassword }}
  {{- $adminPassword := dict "password" .Values.adminPassword "rules" .Values.global.passwordRules }}
  adminPassword: {{ $adminPassword | include "passutil.validated" | b64enc | quote }}
{{- end }}
  {{- $databasePassword := dict "password" .Values.global.database.password "rules" .Values.global.passwordRules }}
  databasePassword: {{ $databasePassword | include "passutil.validated" | b64enc | quote }}
{{- end }}
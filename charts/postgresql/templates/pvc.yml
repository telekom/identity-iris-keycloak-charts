{{- if not (.Values.global.externalDatabase.enabled | default .Values.externalDatabase.enabled) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-data
  labels: {{ include "postgresql.labels" $ | nindent 4 }}
spec:
  storageClassName: {{ .Values.global.storageclass | default .Values.persistence.storageclass }}
  accessModes:
    - ReadWriteOnce
  resources: {{ .Values.persistence.resources | toYaml | nindent 4 }}
{{- end }}

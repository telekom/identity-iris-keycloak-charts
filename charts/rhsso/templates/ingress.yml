{{- if eq .Values.global.platform "kubernetes" -}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  labels: {{ include "keycloak.labels" $ | nindent 4 }}
  annotations:
{{- if .Values.ingress.annotations }}
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
{{- else }}
    external-dns.alpha.kubernetes.io/hostname: {{ include "keycloak.host" . }}
    external-dns.alpha.kubernetes.io/target: {{ .Values.global.externalDnsTarget }}
    kubernetes.io/ingress.class: external-nginx
{{- end }}
spec:
  rules:
  - host: {{ include "keycloak.host" . }}
    http:
      paths:
      - path: /
        backend:
          serviceName: {{ .Release.Name }}
          servicePort: 80
{{- if .Values.ingress.tlsSecret }}
  tls:
  - secretName: {{ .Values.ingress.tlsSecret }}
    hosts:
    - {{ include "keycloak.host" . }}
{{- end }}
{{- end }}
{{- end }}

global:
  project_prefix: "tif-"
  platform: "kubernetes"
  storageclass: "gp2"

  externalDnsTarget: changeme
# Use this for certificate covering all domains (eg wildcard)
#  tls_secret: 'my-wildcard-tls-secret'
  domain:
    internal:
      url: "changeme-internal.tif.telekom.de"
      slug: "changeme_internal_tif_telekom_de"
      labels: {}
      expose: true
# Use this for domain specific certificate
#      tls_secret: 'my-tls-secret'
    external:
      url: "changeme-external.tif.telekom.de"
      slug: "changeme_external_tif_telekom_de"
      labels:
        router: external
      expose: false
# Use this for domain specific certificate
#      tls_secret: 'my-tls-secret'
    
  db:
    database: 'sso'
    username: 'sso'
    password: 'SEE SECRETS'
    admin_username: 'postgres'
    admin_password: 'SEE SECRETS'

  use_external_database: false

postgresql:
  max_connections: "100"
  shared_buffers: "32MB"
  max_prepared_transactions: "100"

  image:
    registry: "mtr.external.otc.telekomcloud.com"
    repository: "tif-public/postgres"
    tag: "stable"

  replicas: 1
  
  resources:
    limits:
      memory: 2G
      cpu: 2000m
    requests:
      cpu: 50m
      memory: 250M

  persistence:
    storageclass: "gp2"
    capacity: "1Gi"

rhsso:
  admin_username: admin
  admin_password: 'SEE SECRETS'
  access_token_lifespan: 300

  image:
    registry: "mtr.external.otc.telekomcloud.com"
    repository: "tif-public/keycloak"
    tag: "stable"
    # for testing on openshift use another image
    tag_openshift: "9.0.0_openshift"
    db_client_registry: "mtr.external.otc.telekomcloud.com"
    db_client_repository: "tif-public/postgres"
    db_client_tag: "stable"

  replicas: 1

  resources:
    requests:
      memory: "2Gi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

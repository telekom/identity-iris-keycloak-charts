global:
  platform: kubernetes
  storageclass: gp2
  domain: ""
  labels:
    # fluentd label
    tif.telekom.de/group: tif
  ingress:
    annotations: {}
      #external-dns.alpha.kubernetes.io/target: ""
      #kubernetes.io/ingress.class: ""

  # If imagePullSecrets is not empty, a pull secret will be deployed for each entry otherwise 
  # no pull secret will be deployed
  # If you use Sapling for deployment this will be set automatically
  imagePullSecrets: []
  #- name: mtr-tif-public
  #  registry: https://mtr.external.otc.telekomcloud.com
  #  username: changeme
  #  password: changeme

  passwordRules:
    enabled: false
    length: 12
    mustMatch:
    - '[a-z]'
    - '[A-Z]'
    - '[0-9]'
    - '[^a-zA-Z0-9]'      
  
  # Database and credentials that will be created for Keycloak
  db:
    database: sso
    username: sso
    password: changeme

  externalDatabase:
    enabled: false
    #host: ''
    #ssl: false
    #sslMode: 'verify-full'
    #sslCert: |
    #  -----BEGIN CERTIFICATE-----
    #  <CA certificate in PEM format here>
    #  -----END CERTIFICATE-----
    #sslKey: |
    #  -----BEGIN PRIVATE KEY-----
    #  <pk8 in PEM format here>
    #  -----END PRIVATE KEY-----
    #sslRootCert: |
    #  -----BEGIN CERTIFICATE-----
    #  <Root certificate in PEM format here>
    #  -----END CERTIFICATE-----

securityContext: {}

#initialDelaySeconds: 60
#periodSeconds: 10
#failureThreshold: 6

# Keycloak admin role credentials
admin_username: admin
admin_password: changeme

realms: []
#  - chevron
#  - tif

access_token_lifespan: 300
  
replicas: 1

resources:
  limits:
    cpu: 1
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 600Mi

ingress:
  enabled: true
  #hostname: ""
  #tlsSecret: ""
  annotations: {}

prometheus:
  enabled: true
  authToken: changeme
  #port: 9542
  #path: /metrics
  # podMonitor is used to provide a PodMonitor CRD to integrate with prometheus operator
  # prometheus has to be enabled to use this
  podMonitor:   
    enabled: false
    #selector: "guardians-raccoon"
    #scheme: http
    #interval: "15s"
    #scrapeTimeout: "3s"
    #honorLabels: ""


customConfig:
  # With the following setting one can set the frontendUrl configuration for hostname SPI
  #frontendUrl: '${keycloak.frontendUrl:}'

  spi: {}
  # As an alternative, one can replace the whole SPI "hostname" configuration block, however this overrides the frontendUrl variable
  #spi:
  #  hostname: |-
  #   <spi name="hostname">
  #     <!-- some xml config -->
  #   </spi>

# Overwrite Java specific options used by Keycloak Wildfly application server
javaOptions: '-XX:+UseContainerSupport -XX:MinRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0 -XX:MetaspaceSize=96M -XX:MaxMetaspaceSize=256m -Djava.net.preferIPv4Stack=true -Djboss.modules.system.pkgs=org.jboss.byteman -Djava.awt.headless=true'

postgresql:
  securityContext: {}

  max_connections: "100"
  shared_buffers: "32MB"
  max_prepared_transactions: "100"

  # You can force using a specific image here:
  #image: 
    #repository: mtr.external.otc.telekomcloud.com
    #organization: tif-public
    #name: postgres
    #tag: 12.3-debian
  # Or use the flattened string form:
  #image: mtr.external.otc.telekomcloud.com/tif-public/postgres:12.3-debian

  # PostgreSQL admin user (postgres) password
  admin_password: changeme

  resources:
    limits:
      cpu: 100m
      memory: 500Mi
    requests:
      cpu: 20m
      memory: 200Mi

  persistence:
    storageclass: gp2
    resources:
      requests:
        storage: 1Gi
    #mountDir: '/var/lib/postgresql/data'
    

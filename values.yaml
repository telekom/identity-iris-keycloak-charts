global:
  project_prefix: "tif-"
  platform: "kubernetes"
  storageclass: "gp2"

  externalDnsTarget: changeme
  domain:
    internal:
      url: "changeme-internal.tif.telekom.de"
      slug: "changeme_internal_tif_telekom_de"
      labels: {}
      expose: true
    external:
      url: "changeme-external.tif.telekom.de"
      slug: "changeme_external_tif_telekom_de"
      labels:
        router: external
      expose: false
    
  db:
    database: 'sso'
    username: 'sso'
    password: 'SEE SECRETS'
    admin_username: 'postgres'
    admin_password: 'SEE SECRETS'

  use_external_database: false

  # If imagePullSecrets is not empty, a pull secret will be deployed for each entry otherwise no pull secret will be deployed
  # If you use tif-infra-pipeline (TIF installer) this will be set automatically
  # imagePullSecrets:
  #   - name: mtr-tif-public
  #     registry: https://mtr.external.otc.telekomcloud.com
  #     username: changeme
  #     password: changeme
  imagePullSecrets: []

postgresql:
  max_connections: "100"
  shared_buffers: "32MB"
  max_prepared_transactions: "100"

  image:
    registry: "mtr.external.otc.telekomcloud.com"
    repository: "tif-public/postgres"
    tag: "stable"

  replicas: 1
  
  resources:
    limits:
      memory: 2G
      cpu: 2000m
    requests:
      cpu: 50m
      memory: 250M

  persistence:
    storageclass: "gp2"
    capacity: "1Gi"

rhsso:

#   Use this for certificate covering all domains (eg wildcard) or separate secrets for each domain
#  tls:
#    secret: 'my-wildcard-tls-secret'
#    domain:
#      internal:
#        secret: 'my-tls-secret'
#      external:
#        secret: 'my-tls-secret'

  admin_username: admin
  admin_password: 'SEE SECRETS'
  access_token_lifespan: 300

  image:
    registry: "mtr.external.otc.telekomcloud.com"
    repository: "tif-public/keycloak"
    tag: "stable"
    # for testing on openshift use another image
    tag_openshift: "9.0.0_openshift"
    db_client_registry: "mtr.external.otc.telekomcloud.com"
    db_client_repository: "tif-public/postgres"
    db_client_tag: "stable"

  replicas: 1

  resources:
    requests:
      memory: "2Gi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
